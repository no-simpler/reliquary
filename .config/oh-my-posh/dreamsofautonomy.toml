console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 4
final_space = true

[secondary_prompt]
  template = '{{if eq .Shell "fish"}}⋗⋗ {{else}}❯❯ {{end}}'
  foreground = 'green'
  background = 'transparent'

[transient_prompt]
  template = '{{if eq .Shell "fish"}}⋗ {{else}}❯ {{end}}'
  background = 'transparent'
  foreground_templates = ['{{if gt .Code 0}}red{{end}}', '{{if eq .Code 0}}green{{end}}']

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '<b>{{ if eq (.Env.PWD) (.Env.HOME) }}~{{ else }}{{ .Folder }}{{ end }}</b>'
    foreground = 'blue'
    background = 'transparent'
    type = 'path'
    style = 'plain'

  [[blocks.segments]]
    template = ' {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }} <cyan>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>'
    foreground = 'p:grey'
    background = 'transparent'
    type = 'git'
    style = 'plain'

[[blocks]]
  type = 'rprompt'
  overflow = 'hidden'

  # ske: show the Touch-ID window whenever one is open, and nothing otherwise.
  # A forgotten open window is the realistic risk here (anyone who could abuse the
  # socket is already running as you), so visibility beats hardening it.
  #
  # $SKE_WINDOW is refreshed before each render by _ske_window in
  # shell/interactive.d/050-prompt.{zsh,bash} and fish/conf.d/050-prompt.fish.
  #
  # NOT an oh-my-posh `command` segment: that type was REMOVED upstream (v29's
  # schema has no such type and silently renders nothing — it does not error). A
  # text segment over .Env is the supported way to surface external state.
  [[blocks.segments]]
    template = '{{ if .Env.SKE_WINDOW }}🗝 {{ .Env.SKE_WINDOW }}{{ end }}'
    foreground = 'red'
    background = 'transparent'
    type = 'text'
    style = 'plain'

  [[blocks.segments]]
    template = '{{ .FormattedMs }}'
    foreground = 'yellow'
    background = 'transparent'
    type = 'executiontime'
    style = 'plain'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '{{if eq .Shell "fish"}}⋗{{else}}❯{{end}}'
    background = 'transparent'
    type = 'text'
    style = 'plain'
    foreground_templates = ['{{if gt .Code 0}}red{{end}}', '{{if eq .Code 0}}green{{end}}']

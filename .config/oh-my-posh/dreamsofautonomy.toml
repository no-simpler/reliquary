console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 4
final_space = true

[secondary_prompt]
  template = '{{if eq .Shell "fish"}}⋗⋗ {{else}}❯❯ {{end}}'
  foreground = 'green'
  background = 'transparent'

[transient_prompt]
  template = '{{if eq .Shell "fish"}}⋗ {{else}}❯ {{end}}'
  background = 'transparent'
  foreground_templates = ['{{if gt .Code 0}}red{{end}}', '{{if eq .Code 0}}green{{end}}']

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '<b>{{ if eq (.Env.PWD) (.Env.HOME) }}~{{ else }}{{ .Folder }}{{ end }}</b>'
    foreground = 'blue'
    background = 'transparent'
    type = 'path'
    style = 'plain'

  [[blocks.segments]]
    template = ' {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }} <cyan>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>'
    foreground = 'p:grey'
    background = 'transparent'
    type = 'git'
    style = 'plain'

[[blocks]]
  type = 'rprompt'
  overflow = 'hidden'

  # ske: show the Touch-ID window whenever one is open, and nothing otherwise.
  # A forgotten open window is the realistic risk (anyone who could abuse it is
  # already running as you), so visibility beats hardening the socket.
  #
  # Delegated to a script rather than inlined: oh-my-posh's command segment gives
  # `||`/`&&` its own meaning and mangles a chained predicate. ~10ms per render;
  # silent, and renders nothing at all, when no window is open.
  [[blocks.segments]]
    template = '🗝 {{ .Output }}'
    foreground = 'red'
    background = 'transparent'
    type = 'command'
    style = 'plain'

    [blocks.segments.properties]
      shell = 'sh'
      command = '~/.config/bin/ske-prompt'

  [[blocks.segments]]
    template = '{{ .FormattedMs }}'
    foreground = 'yellow'
    background = 'transparent'
    type = 'executiontime'
    style = 'plain'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '{{if eq .Shell "fish"}}⋗{{else}}❯{{end}}'
    background = 'transparent'
    type = 'text'
    style = 'plain'
    foreground_templates = ['{{if gt .Code 0}}red{{end}}', '{{if eq .Code 0}}green{{end}}']
